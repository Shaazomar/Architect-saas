services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Set a real key in production:  ARCH_API_KEY: ${ARCH_API_KEY}
      ARCH_CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - api_data:/srv/app/data
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api_data:
